version: "3.8"

services:
  app:
    platform: linux/amd64
    image: mmdctjj/audiodock:latest
    container_name: audiodock-app
    ports:
      - "8858:3000"
      - "9958:9958"

    environment:
      - NODE_ENV=production
      - TXT_BASE_DIR=/txt
      - AUDIO_BOOK_DIR=/audio
      - MUSIC_BASE_DIR=/music
      - CACHE_DIR=/covers
      - DATABASE_URL=file:/app/packages/db/prisma/dev.db
      - JWT_SECRET=/.jwt_secret
      - PORT=3000
      - STRM_ADDRESS=http://192.168.1.12:5244
      - WEBDAV_MUSIC_URL=http://192.168.1.12:5005/音乐
      - WEBDAV_AUDIOBOOK_URL=http://192.168.1.12:5005/有声书
      - WEBDAV_USER=admin
      - WEBDAV_PASSWORD=123456
      - DISABLE_TTS=${DISABLE_TTS:-false}
      - DISABLE_ASR=${DISABLE_ASR:-false}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60000}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_API_KEY=${LLM_API_KEY:-}

    volumes:
      - /volume1/txt:/txt
      - /volume1/audio:/audio
      - /volume1/music:/music
      - ./covers:/covers
      - app-db:/app/packages/db/prisma
      - ./.jwt_secret:/.jwt_secret
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    restart: unless-stopped
    networks:
      - audiodock-network

volumes:
  app-db:

networks:
  audiodock-network:
