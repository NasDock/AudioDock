name: Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # 使用 GitHub Actions 提供的可靠网络
          PNPM_REGISTRY_URL: https://registry.npmmirror.com

      - name: Build packages
        run: |
          pnpm run build --filter=@autiodock/utils
          pnpm run build --filter=@autiodock/ws
          pnpm run build --filter=@autiodock/db
          pnpm run build --filter=@autiodock/services
          pnpm run build --filter=@autiodock/api
          pnpm run build --filter=@autiodock/desktop

      - name: Generate Prisma client
        run: pnpm --filter=@autiodock/db run generate

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audiodock-artifacts
          path: |
            node_modules
            packages/db/dist
            packages/db/prisma
            packages/db/generated
            packages/utils/dist
            packages/ws/dist
            packages/services/dist
            services/api/dist
            apps/desktop/dist
          retention-days: 1

  build-and-push:
    runs-on: ubuntu-latest
    needs: build-artifacts
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: audiodock-artifacts
          path: ./artifacts

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./artifacts
          file: ./artifacts/Dockerfile.hybrid
          target: runner
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
