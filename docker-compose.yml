version: "3.8"

services:
  app:
    platform: linux/amd64
    image: audiodock-app
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: audiodock-app
    ports:
      - "3000:3000" # Node API
      - "9958:9958" # Web UI
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/packages/db/prisma/dev.db
      - JWT_SECRET=/.jwt_secret
      - TXT_BASE_DIR=/txt
      - AUDIO_BOOK_DIR=/audio
      - MUSIC_BASE_DIR=/music
      - CACHE_DIR=/covers
    volumes:
      # 这里可以根据需要调整物理机的挂载路径
      - ./services/api/music/txt:/txt
      - ./services/api/music/audio:/audio
      - ./services/api/music/music:/music
      - ./services/api/music/covers:/covers
      - app-db:/app/packages/db/prisma # 将数据库文件目录挂载出来持久化
      - ./services/api/.jwt_secret:/.jwt_secret
    restart: unless-stopped
    networks:
      - audiodock-network

volumes:
  app-db: # 命名卷用于持久化数据库

networks:
  audiodock-network:
    driver: bridge
